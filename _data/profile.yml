short_bio: >-
  <p>
    Hello! My name is <strong>Zhenyu Lei</strong> (pronounced like "Jen-yoo Lei").
    I am an incoming Ph.D. student at the University of Rochester, advised by <a href="https://yananguo.com/" target="_blank">Prof. Yanan Guo</a>. I received my M.Eng. degree in Cyberspace Security at Southeast University, advised by <a href="https://fei-tong.github.io/" target="_blank">Prof. Fei Tong</a>.
  </p>
  <p>
    My past research focused on CPU microarchitectural security, using fuzzing and formal methods. I am currently expanding my research toward GPU performance and security.
  </p>


