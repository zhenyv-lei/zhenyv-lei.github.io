short_bio: >-
  <p>
    Hello! My name is <strong>Zhenyu Lei</strong> (pronounced like "Jen-yoo Lei"). 
    I am currently pursuing an M.S. degree at Southeast University, fortunate to be advised by <a href="https://fei-tong.github.io/" target="_blank">Prof. Fei Tong</a>. 
  </p>
  <p>
    My primary research interest lies in Microarchitectural Security across the full lifecycle. On the post-silicon side,I develop feedback-driven fuzzing techniques ( <em>Revizor-E3</em> ) to automatically identify timing leaking behaviors in deployed processors. On the pre-silicon side, I design contract-based formal verification frameworks ( <em>SoC Contract</em> ) to provide provable security guarantees for processor designs at the RTL stage.
  </p>


